<!DOCTYPE html>
<html>
<head>
    <title>SQL Clone Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: white; display: flex; flex-direction: column; align-items: center; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #3d3d3d; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007acc; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #005f99; }
        #result { margin-top: 20px; padding: 10px; border-left: 4px solid #007acc; background: #383838; display: none; }
    </style>
</head>
<body>
    <h1>Go-SQL-Clone Indexer</h1>
    <div class="card">
        <h3>Query B+ Tree</h3>
        <input type="number" id="userId" placeholder="Enter User ID (e.g. 999)">
        <button onclick="findUser()">Search Disk</button>
        <div id="result"></div>
    </div>

    <script>
        async function findUser() {
            const id = document.getElementById('userId').value;
            const resDiv = document.getElementById('result');
            
            try {
                const response = await fetch(`/api/find?id=${id}`);
                if (!response.ok) throw new Error("Not found in B+ Tree");
                const data = await response.json();
                resDiv.style.display = "block";
                resDiv.innerHTML = `<strong>Status:</strong> O(log N) Success<br>
                                    <strong>ID:</strong> ${data.id}<br>
                                    <strong>Name:</strong> ${data.name}`;
            } catch (err) {
                resDiv.style.display = "block";
                resDiv.innerHTML = `<span style="color: #ff4d4d;">Error: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
